<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Problem Transfer Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full text-slate-800 font-sans antialiased">

  <header class="bg-white border-b border-slate-200 px-6 py-4">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-violet-100 rounded-lg flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-violet-600">
            <path d="M10.75 10.818v2.614A3.13 3.13 0 0 0 11.888 13c.482-.315.612-.648.612-.875 0-.227-.13-.56-.612-.875a3.13 3.13 0 0 0-1.138-.432ZM8.33 8.62c.053.055.115.11.184.164.208.16.46.284.736.363V6.603a2.45 2.45 0 0 0-.35.13c-.14.065-.27.143-.386.233-.377.292-.514.627-.514.909 0 .184.058.39.33.625Z" />
            <path fill-rule="evenodd" d="M9.99 1.875a8.125 8.125 0 1 0 0 16.25 8.125 8.125 0 0 0 0-16.25ZM4.752 7.532A6.625 6.625 0 0 1 9.99 3.25a6.625 6.625 0 0 1 6.623 6.25H4.752ZM3.375 10a6.63 6.63 0 0 0 6.615 6.625c3.63 0 6.574-2.93 6.622-6.535a.75.75 0 0 0-.75-.765H4.125a.75.75 0 0 0-.75.675Z" clip-rule="evenodd" />
          </svg>
        </div>
        <div>
          <h1 class="text-sm font-semibold text-slate-900">Problem Transfer Engine</h1>
          <p id="header-subtitle" class="text-xs text-slate-400"></p>
        </div>
      </div>
      <div class="flex items-center bg-slate-100 rounded-lg p-1 gap-1">
        <button id="lang-en" onclick="setLang('en')" class="px-3 py-1.5 text-xs font-semibold rounded-md transition-colors">EN</button>
        <button id="lang-no" onclick="setLang('no')" class="px-3 py-1.5 text-xs font-semibold rounded-md transition-colors">NO</button>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-6 py-12">

    <div class="text-center mb-10">
      <h2 id="hero-title" class="text-2xl font-bold text-slate-900 mb-2"></h2>
      <p id="hero-subtitle" class="text-slate-500 text-sm max-w-xl mx-auto"></p>
    </div>

    <!-- Step 1: Input -->
    <div id="step-input" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
      <textarea id="problem-input" rows="4"
        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-transparent resize-none"
      ></textarea>
      <div class="mt-4 flex items-center justify-between">
        <p id="input-tip" class="text-xs text-slate-400"></p>
        <div class="flex items-center gap-3">
          <span id="status" class="text-xs text-slate-400"></span>
          <button id="next-btn" onclick="fetchQuestions()"
            class="inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition-colors shadow-sm">
            <span id="btn-label"></span>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
              <path fill-rule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Step 2: Clarifying questions -->
    <div id="step-questions" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
      <div class="flex items-center gap-2 mb-5">
        <button onclick="backToInput()" class="text-slate-400 hover:text-slate-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 1 1 1.04 1.08L5.612 9.25H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd" />
          </svg>
        </button>
        <p id="questions-heading" class="text-sm font-semibold text-slate-700"></p>
      </div>
      <div id="questions-list" class="space-y-4"></div>
      <div class="mt-6 flex items-center justify-between">
        <p id="questions-tip" class="text-xs text-slate-400"></p>
        <div class="flex items-center gap-3">
          <span id="questions-status" class="text-xs text-slate-400"></span>
          <button id="analyze-btn" onclick="analyze()"
            class="inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition-colors shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
              <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
            </svg>
            <span id="analyze-label"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Step 3: Editable structure + assumptions -->
    <div id="step-structure" class="hidden space-y-6 mb-8">

      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <div class="flex items-center gap-2 mb-1">
          <button onclick="backToQuestions()" class="text-slate-400 hover:text-slate-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
              <path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.612l4.158 3.96a.75.75 0 1 1-1.04 1.08l-5.5-5.25a.75.75 0 0 1 0-1.08l5.5-5.25a.75.75 0 1 1 1.04 1.08L5.612 9.25H16.25A.75.75 0 0 1 17 10Z" clip-rule="evenodd" />
            </svg>
          </button>
          <h3 id="structure-edit-heading" class="text-sm font-semibold text-slate-700"></h3>
        </div>
        <p id="structure-edit-tip" class="text-xs text-slate-400 mb-5 ml-6"></p>
        <div id="structure-edit-grid" class="grid grid-cols-2 gap-3"></div>
      </div>

      <!-- Hidden assumptions -->
      <div id="assumptions-block" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <h3 id="assumptions-heading-el" class="text-sm font-semibold text-slate-700 mb-4"></h3>
        <div id="assumptions-list" class="space-y-3"></div>
      </div>

      <div class="flex items-center justify-end gap-3">
        <span id="generate-status" class="text-xs text-slate-400"></span>
        <button id="generate-btn" onclick="generateAnalogies()"
          class="inline-flex items-center gap-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition-colors shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
          </svg>
          <span id="generate-btn-label"></span>
        </button>
      </div>
    </div>

    <div id="results" class="hidden space-y-8">

      <!-- Synthesis -->
      <div id="synthesis-block" class="bg-violet-600 rounded-2xl p-6 text-white">
        <div class="flex items-start gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 mt-0.5 shrink-0 opacity-80">
            <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd" />
          </svg>
          <div>
            <p id="synthesis-label" class="text-xs font-semibold uppercase tracking-widest opacity-70 mb-2"></p>
            <p id="synthesis-insight" class="text-base font-semibold leading-snug mb-2"></p>
            <p id="synthesis-implication" class="text-sm opacity-80 leading-relaxed"></p>
          </div>
        </div>
      </div>

      <!-- Problem structure -->
      <div>
        <h3 id="structure-heading" class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4"></h3>
        <div id="structure-grid" class="grid grid-cols-2 gap-3"></div>
      </div>

      <!-- Analogies -->
      <div>
        <h3 id="analogies-heading" class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4"></h3>
        <div id="analogies-list" class="space-y-4"></div>
      </div>

    </div>
  </main>

  <!-- Deep dive panel -->
  <div id="panel-overlay" class="fixed inset-0 bg-black/20 z-40 hidden" onclick="closePanel()"></div>
  <div id="deep-panel" class="fixed top-0 right-0 h-full w-full max-w-xl bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-out flex flex-col">

    <!-- Panel header -->
    <div class="flex items-center justify-between px-6 py-5 border-b border-slate-200 shrink-0">
      <div>
        <p id="panel-label" class="text-xs font-semibold text-violet-600 uppercase tracking-widest mb-0.5"></p>
        <h2 id="panel-domain" class="text-base font-bold text-slate-900"></h2>
      </div>
      <button onclick="closePanel()" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
          <path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
        </svg>
      </button>
    </div>

    <!-- Panel loading state -->
    <div id="panel-loading" class="flex-1 flex items-center justify-center">
      <div class="text-center">
        <svg class="animate-spin w-8 h-8 text-violet-400 mx-auto mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
        </svg>
        <p id="panel-loading-text" class="text-sm text-slate-400"></p>
      </div>
    </div>

    <!-- Panel content -->
    <div id="panel-content" class="hidden flex-1 overflow-y-auto px-6 py-6 space-y-8"></div>

  </div>

    let lang = 'en'
    const cache = {}

    function setLang(l) {
      lang = l
      const t = i18n[l]
      document.getElementById('header-subtitle').textContent = t.headerSubtitle
      document.getElementById('hero-title').textContent = t.heroTitle
      document.getElementById('hero-subtitle').textContent = t.heroSubtitle
      document.getElementById('problem-input').placeholder = t.placeholder
      document.getElementById('input-tip').textContent = t.tip
      const btnLabel = document.getElementById('btn-label')
      if (btnLabel) btnLabel.textContent = t.nextBtn
      const analyzeLabel = document.getElementById('analyze-label')
      if (analyzeLabel) analyzeLabel.textContent = t.analyzeLabel
      const qHeading = document.getElementById('questions-heading')
      if (qHeading) qHeading.textContent = t.questionsHeading
      const qTip = document.getElementById('questions-tip')
      if (qTip) qTip.textContent = t.questionsTip
      const genLabel = document.getElementById('generate-btn-label')
      if (genLabel) genLabel.textContent = t.generateBtn
      const assHead = document.getElementById('assumptions-heading-el')
      if (assHead) assHead.textContent = t.assumptionsHeading
      const structHead = document.getElementById('structure-edit-heading')
      if (structHead) structHead.textContent = t.structureHeadingLabel
      const structTip = document.getElementById('structure-edit-tip')
      if (structTip) structTip.textContent = t.structureTip

      document.getElementById('lang-en').className = l === 'en'
        ? 'px-3 py-1.5 text-xs font-semibold rounded-md transition-colors bg-white text-slate-800 shadow-sm'
        : 'px-3 py-1.5 text-xs font-semibold rounded-md transition-colors text-slate-500 hover:text-slate-700'
      document.getElementById('lang-no').className = l === 'no'
        ? 'px-3 py-1.5 text-xs font-semibold rounded-md transition-colors bg-white text-slate-800 shadow-sm'
        : 'px-3 py-1.5 text-xs font-semibold rounded-md transition-colors text-slate-500 hover:text-slate-700'

      const resultsVisible = !document.getElementById('results').classList.contains('hidden')
      if (!resultsVisible) return

      if (cache[l]) {
        renderResults(cache[l])
      } else {
        // No cached translation — re-run analogies with the current structure
        const problem = document.getElementById('problem-input').value.trim()
        if (!problem || !_currentStructure) return
        document.getElementById('status').textContent = t.statusMsg
        fetch('/analogies', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, structure: _currentStructure, lang: l, answers: getAnswers() })
        })
          .then(r => r.json())
          .then(data => {
            const full = { structure: _currentStructure, ...data }
            cache[l] = full
            if (lang === l) {
              renderResults(full)
              document.getElementById('status').textContent = ''
            }
          })
          .catch(e => { document.getElementById('status').textContent = 'Error: ' + e.message })
      }
    }

    // Step 2 → Step 3: fetch structure and show editable view
    async function analyze() {
      const problem = document.getElementById('problem-input').value.trim()
      if (!problem) return
      const t = i18n[lang]
      const btn = document.getElementById('analyze-btn')
      const status = document.getElementById('questions-status')

      btn.disabled = true
      btn.innerHTML = `<svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
      </svg><span>${t.analyzing}</span>`
      status.textContent = t.statusMsg

      try {
        const res = await fetch('/structure', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, lang, answers: getAnswers() })
        })
        const data = await res.json()
        if (data.error) throw new Error(data.error)
        _currentStructure = data.structure
        renderStructureEditor(data.structure, t)
        document.getElementById('step-questions').classList.add('hidden')
        document.getElementById('step-structure').classList.remove('hidden')
        document.getElementById('results').classList.add('hidden')
      } catch (e) {
        status.textContent = 'Error: ' + e.message
      } finally {
        btn.disabled = false
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
        </svg><span id="analyze-label">${i18n[lang].analyzeLabel}</span>`
        status.textContent = ''
      }
    }

    function backToQuestions() {
      document.getElementById('step-structure').classList.add('hidden')
      document.getElementById('step-questions').classList.remove('hidden')
    }

    function renderStructureEditor(structure, t) {
      document.getElementById('structure-edit-heading').textContent = t.structureHeadingLabel
      document.getElementById('structure-edit-tip').textContent = t.structureTip
      document.getElementById('generate-btn-label').textContent = t.generateBtn
      document.getElementById('assumptions-heading-el').textContent = t.assumptionsHeading

      const sectionDefs = [
        { key: 'mechanisms', label: t.sections[0], color: 'violet' },
        { key: 'constraints', label: t.sections[1], color: 'amber' },
        { key: 'desired_outcomes', label: t.sections[2], color: 'emerald' },
        { key: 'anti_goals', label: t.sections[3], color: 'rose' },
      ]

      document.getElementById('structure-edit-grid').innerHTML = sectionDefs.map(s => `
        <div class="bg-${s.color}-50 border border-${s.color}-100 rounded-xl p-4">
          <div class="text-xs font-semibold text-${s.color}-600 mb-2">${s.label}</div>
          <div id="edit-${s.key}" class="space-y-1.5">
            ${(structure[s.key] || []).map((item, i) => `
              <div class="flex gap-1.5 items-start">
                <span class="text-${s.color}-400 mt-2 text-xs shrink-0">•</span>
                <input type="text" value="${item.replace(/"/g, '&quot;')}"
                  data-field="${s.key}" data-index="${i}"
                  onchange="updateStructureField(this)"
                  class="w-full text-xs text-slate-700 bg-white border border-${s.color}-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-${s.color}-400" />
              </div>`).join('')}
          </div>
        </div>`).join('')

      const assumptions = structure.hidden_assumptions || []
      document.getElementById('assumptions-list').innerHTML = assumptions.length ? assumptions.map(a => `
        <div class="border border-slate-200 rounded-xl p-4 space-y-1.5">
          <p class="text-sm text-slate-700">"${esc(a.assumption)}"</p>
          <p class="text-xs text-violet-600 font-medium">${t.assumptionChallenge}: ${esc(a.challenge)}</p>
        </div>`).join('') : '<p class="text-xs text-slate-400">No assumptions extracted.</p>'
    }

    function updateStructureField(input) {
      const field = input.dataset.field
      const index = parseInt(input.dataset.index)
      if (_currentStructure && _currentStructure[field]) {
        _currentStructure[field][index] = input.value
      }
    }

    // Step 3 → Results: generate analogies from (possibly edited) structure
    async function generateAnalogies() {
      const problem = document.getElementById('problem-input').value.trim()
      if (!problem || !_currentStructure) return
      const t = i18n[lang]
      const btn = document.getElementById('generate-btn')
      const status = document.getElementById('generate-status')

      btn.disabled = true
      btn.innerHTML = `<svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
      </svg><span>${t.generatingMsg}</span>`
      status.textContent = ''

      try {
        const res = await fetch('/analogies', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, structure: _currentStructure, lang, answers: getAnswers() })
        })
        const data = await res.json()
        if (data.error) throw new Error(data.error)
        Object.keys(cache).forEach(k => delete cache[k])
        const full = { structure: _currentStructure, ...data }
        cache[lang] = full
        renderResults(full)
        document.getElementById('step-structure').classList.add('hidden')
      } catch (e) {
        status.textContent = 'Error: ' + e.message
      } finally {
        btn.disabled = false
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z" clip-rule="evenodd" />
        </svg><span id="generate-btn-label">${t.generateBtn}</span>`
      }
    }

    function renderResults(data) {
      const t = i18n[lang]
      const { structure, analogies, synthesis } = data

      // Synthesis block
      document.getElementById('synthesis-label').textContent = t.synthesisLabel
      document.getElementById('synthesis-insight').textContent = synthesis.meta_insight
      document.getElementById('synthesis-implication').textContent = synthesis.implication

      // Structure
      document.getElementById('structure-heading').textContent = t.structureHeading
      const sectionDefs = [
        { key: 'mechanisms', bg: 'bg-violet-50', border: 'border-violet-100', dot: 'text-violet-400', heading: 'text-violet-600' },
        { key: 'constraints', bg: 'bg-amber-50', border: 'border-amber-100', dot: 'text-amber-400', heading: 'text-amber-600' },
        { key: 'desired_outcomes', bg: 'bg-emerald-50', border: 'border-emerald-100', dot: 'text-emerald-400', heading: 'text-emerald-600' },
        { key: 'anti_goals', bg: 'bg-rose-50', border: 'border-rose-100', dot: 'text-rose-400', heading: 'text-rose-600' },
      ]
      document.getElementById('structure-grid').innerHTML = sectionDefs.map((s, i) => `
        <div class="${s.bg} border ${s.border} rounded-xl p-4">
          <div class="text-xs font-semibold ${s.heading} mb-2">${t.sections[i]}</div>
          <ul class="space-y-1.5">
            ${(structure[s.key] || []).map(item => `
              <li class="text-xs text-slate-600 flex gap-2">
                <span class="${s.dot} shrink-0">•</span><span>${esc(item)}</span>
              </li>`).join('')}
          </ul>
        </div>`).join('')

      // Analogies — sort by score, find best
      document.getElementById('analogies-heading').textContent = t.analogiesHeading
      analogies.sort((a, b) => b.transferability_score - a.transferability_score)
      const bestScore = analogies[0].transferability_score

      document.getElementById('analogies-list').innerHTML = analogies.map((a, i) => {
        const score = a.transferability_score
        const isBest = score === bestScore
        const barFilled = Math.round(score / 10)
        const scoreColor = score >= 80 ? 'text-emerald-600' : score >= 65 ? 'text-amber-600' : 'text-rose-600'
        const barColor = score >= 80 ? 'bg-emerald-400' : score >= 65 ? 'bg-amber-400' : 'bg-rose-400'
        const levelLabel = t.levelLabels[a.explanation_level] || a.explanation_level

        return `
        <div class="bg-white rounded-2xl border ${isBest ? 'border-violet-300 shadow-md shadow-violet-100' : 'border-slate-200 shadow-sm'} overflow-hidden">

          <div class="flex items-center justify-between px-6 py-4 border-b ${isBest ? 'border-violet-100 bg-violet-50' : 'border-slate-100'}">
            <div class="flex items-center gap-3">
              <span class="w-6 h-6 rounded-full ${isBest ? 'bg-violet-200 text-violet-700' : 'bg-slate-100 text-slate-500'} text-xs font-bold flex items-center justify-center">${i + 1}</span>
              <div>
                <h3 class="text-sm font-semibold text-slate-900">${esc(a.domain)}</h3>
                <span class="text-xs text-slate-400">${esc(levelLabel)}</span>
              </div>
              ${isBest ? `<span class="ml-1 text-xs font-semibold text-violet-600 bg-violet-100 px-2 py-0.5 rounded-full">${t.bestMatch}</span>` : ''}
              ${a.wikipedia_changed_answer ? `<span class="ml-1 text-xs font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full" title="${a.what_changed || ''}">✎ ${t.wikiRevisedLabel}</span>` : ''}
              ${a.evidence_level ? `<span class="ml-1 text-xs font-medium px-2 py-0.5 rounded-full ${
                a.evidence_level === 'documented' ? 'text-emerald-700 bg-emerald-50' :
                a.evidence_level === 'limited' ? 'text-amber-700 bg-amber-50' :
                'text-slate-500 bg-slate-100'
              }">${t.evidenceLabels[a.evidence_level]}</span>` : ''}
            </div>
            <div class="flex items-center gap-2">
              <div class="flex gap-0.5">
                ${Array.from({length: 10}, (_, j) => `<div class="w-2 h-2 rounded-sm ${j < barFilled ? barColor : 'bg-slate-100'}"></div>`).join('')}
              </div>
              <span class="text-xs font-semibold ${scoreColor}">${score}/100</span>
            </div>
          </div>

          <div class="px-6 py-5 space-y-5">
            <div>
              <div class="text-xs font-medium text-slate-400 mb-1">${t.whySimilar}</div>
              <p class="text-sm text-slate-700 leading-relaxed">${esc(a.why_similar)}</p>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <div class="text-xs font-medium text-slate-400 mb-1">${t.solutionMethod}</div>
                <p class="text-sm text-slate-700 leading-relaxed">${esc(a.solution_method)}</p>
              </div>
              <div>
                <div class="text-xs font-medium text-slate-400 mb-1">${t.realExample}</div>
                <p class="text-sm text-slate-700 leading-relaxed">${esc(a.concrete_example)}</p>
              </div>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div class="bg-emerald-50 border border-emerald-100 rounded-xl px-4 py-3">
                <div class="text-xs font-semibold text-emerald-600 mb-1">${t.whereHolds}</div>
                <p class="text-xs text-slate-600 leading-relaxed">${esc(a.where_it_holds)}</p>
              </div>
              <div class="bg-rose-50 border border-rose-100 rounded-xl px-4 py-3">
                <div class="text-xs font-semibold text-rose-600 mb-1">${t.whereBreaks}</div>
                <p class="text-xs text-slate-600 leading-relaxed">${esc(a.where_it_breaks)}</p>
              </div>
            </div>
            <div class="flex items-start gap-3 ${isBest ? 'bg-violet-600 border-violet-600' : 'bg-violet-50 border-violet-100'} border rounded-xl px-4 py-3">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 ${isBest ? 'text-white opacity-80' : 'text-violet-500'} mt-0.5 shrink-0">
                <path fill-rule="evenodd" d="M10 1a4.5 4.5 0 0 0-4.5 4.5V9H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6a2 2 0 0 0-2-2h-.5V5.5A4.5 4.5 0 0 0 10 1Zm3 8V5.5a3 3 0 1 0-6 0V9h6Z" clip-rule="evenodd" />
              </svg>
              <p class="text-xs ${isBest ? 'text-white' : 'text-slate-700'} leading-relaxed">
                <span class="font-semibold ${isBest ? 'text-white' : 'text-violet-700'}">${t.nextStep}: </span>${esc(a.action_next_step)}
              </p>
            </div>

            ${a.epistemic_status ? (() => {
              const basis = a.epistemic_status.basis
              const styles = {
                empirical:       'bg-emerald-50 border-emerald-200 text-emerald-700',
                implementation:  'bg-blue-50 border-blue-200 text-blue-700',
                structural:      'bg-amber-50 border-amber-200 text-amber-700',
                speculative:     'bg-slate-50 border-slate-200 text-slate-500',
              }
              const icons = {
                empirical:      '🔬',
                implementation: '🏗️',
                structural:     '🧩',
                speculative:    '💭',
              }
              return `<div class="border rounded-xl px-4 py-3 ${styles[basis] || styles.speculative}">
                <div class="flex items-center gap-2 mb-1">
                  <span>${icons[basis] || '💭'}</span>
                  <span class="text-xs font-semibold">${t.epistemicLabels[basis] || basis}</span>
                </div>
                <p class="text-xs leading-relaxed opacity-80">${t.epistemicHelp[basis] || ''}</p>
                ${a.epistemic_status.confidence_note ? `<p class="text-xs mt-1 italic opacity-70">"${a.epistemic_status.confidence_note}"</p>` : ''}
              </div>`
            })() : ''}

            ${(a.papers && a.papers.length > 0) ? `
            <div class="border-t border-slate-100 pt-4">
              <div class="text-xs font-medium text-slate-400 mb-2">${t.papersLabel}</div>
              <ul class="space-y-1.5">
                ${a.papers.map(p => `
                  <li class="flex items-start gap-2 text-xs text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5 text-slate-300 mt-0.5 shrink-0">
                      <path d="M3 3.5A1.5 1.5 0 0 1 4.5 2h4.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 1 .439 1.061V12.5A1.5 1.5 0 0 1 11.5 14h-7A1.5 1.5 0 0 1 3 12.5v-9Z" />
                    </svg>
                    <span>
                      ${p.doi ? `<a href="${p.doi}" target="_blank" class="hover:text-violet-600 hover:underline">${p.title}</a>` : p.title}
                      <span class="text-slate-400 ml-1">${p.year} · ${p.citations} citations</span>
                    </span>
                  </li>`).join('')}
              </ul>
            </div>` : ''}

            <button onclick="openExplore(${i})"
              class="w-full flex items-center justify-center gap-2 border ${isBest ? 'border-violet-300 text-violet-700 hover:bg-violet-50' : 'border-slate-200 text-slate-600 hover:bg-slate-50'} rounded-xl px-4 py-2.5 text-sm font-medium transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                <path d="M10 12.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
                <path fill-rule="evenodd" d="M.664 10.59a1.651 1.651 0 0 1 0-1.186A10.004 10.004 0 0 1 10 3c4.257 0 7.893 2.66 9.336 6.41.147.381.146.804 0 1.186A10.004 10.004 0 0 1 10 17c-4.257 0-7.893-2.66-9.336-6.41ZM14 10a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" clip-rule="evenodd" />
              </svg>
              ${t.exploreBtn}
            </button>
          </div>
        </div>`
      }).join('')

      document.getElementById('results').classList.remove('hidden')
      document.getElementById('results').scrollIntoView({ behavior: 'smooth' })
    }

    // ── Security ──────────────────────────────────────────────────
    function esc(str) {
      if (!str) return ''
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    // ── Shared state ──────────────────────────────────────────────
    let _currentStructure = null

    // ── Questions step ────────────────────────────────────────────

    let _questions = []

    async function fetchQuestions() {
      const problem = document.getElementById('problem-input').value.trim()
      if (!problem) return
      const t = i18n[lang]
      const btn = document.getElementById('next-btn')
      const status = document.getElementById('status')

      btn.disabled = true
      btn.innerHTML = `<svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
      </svg>`
      status.textContent = t.statusMsg

      try {
        const res = await fetch('/questions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ problem, lang })
        })
        const data = await res.json()
        if (data.error) throw new Error(data.error)
        _questions = data.questions || []
        renderQuestions(_questions, t)
        document.getElementById('step-input').classList.add('hidden')
        document.getElementById('step-questions').classList.remove('hidden')
        document.getElementById('results').classList.add('hidden')
      } catch(e) {
        status.textContent = 'Error: ' + e.message
      } finally {
        btn.disabled = false
        btn.innerHTML = `<span id="btn-label">${t.nextBtn}</span>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clip-rule="evenodd" />
          </svg>`
        status.textContent = ''
      }
    }

    function renderQuestions(questions, t) {
      document.getElementById('questions-heading').textContent = t.questionsHeading
      document.getElementById('questions-tip').textContent = t.questionsTip
      document.getElementById('analyze-label').textContent = t.analyzeLabel
      document.getElementById('questions-list').innerHTML = questions.map((q, i) => `
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            <span class="text-violet-500 font-bold mr-1">${i + 1}.</span>${q.question}
          </label>
          <textarea id="answer-${q.id}" rows="2" placeholder="${q.placeholder || ''}"
            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-transparent resize-none"
          ></textarea>
        </div>`).join('')
    }

    function backToInput() {
      document.getElementById('step-questions').classList.add('hidden')
      document.getElementById('step-input').classList.remove('hidden')
    }

    function getAnswers() {
      const answers = {}
      _questions.forEach(q => {
        const el = document.getElementById(`answer-${q.id}`)
        if (el && el.value.trim()) answers[q.question] = el.value.trim()
      })
      return answers
    }

    // ── Deep dive panel ───────────────────────────────────────────

    function openExplore(analogyIndex) {
      const t = i18n[lang]
      const data = cache[lang]
      if (!data) return
      const analogy = data.analogies[analogyIndex]

      document.getElementById('panel-label').textContent = t.panelLabel
      document.getElementById('panel-domain').textContent = analogy.domain
      document.getElementById('panel-loading-text').textContent = t.panelLoading
      document.getElementById('panel-loading').classList.remove('hidden')
      document.getElementById('panel-content').classList.add('hidden')
      document.getElementById('panel-overlay').classList.remove('hidden')
      document.getElementById('deep-panel').classList.remove('translate-x-full')

      const problem = document.getElementById('problem-input').value.trim()
      fetch('/deep-dive', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ problem, analogy, lang, answers: getAnswers() })
      })
        .then(r => r.json())
        .then(dd => {
          document.getElementById('panel-loading').classList.add('hidden')
          document.getElementById('panel-content').classList.remove('hidden')
          // Pass analogy papers into deep dive for source display
          dd._papers = analogy.papers || []
          document.getElementById('panel-content').innerHTML = renderDeepDive(dd, t)
        })
        .catch(e => {
          document.getElementById('panel-loading').classList.add('hidden')
          document.getElementById('panel-loading-text').textContent = 'Error: ' + e.message
        })
    }

    function closePanel() {
      document.getElementById('deep-panel').classList.add('translate-x-full')
      document.getElementById('panel-overlay').classList.add('hidden')
    }

    function renderDeepDive(dd, t) {
      const effortColor = { low: 'text-emerald-600 bg-emerald-50', medium: 'text-amber-600 bg-amber-50', high: 'text-rose-600 bg-rose-50' }
      return `
        ${dd.wikipedia && dd.wikipedia.extract ? `
        <div class="bg-slate-50 border border-slate-200 rounded-xl p-4 flex gap-4">
          ${dd.wikipedia.thumbnail ? `<img src="${dd.wikipedia.thumbnail}" class="w-16 h-16 rounded-lg object-cover shrink-0" />` : ''}
          <div>
            <div class="text-xs font-semibold text-slate-400 mb-1">${t.wikiLabel}</div>
            <p class="text-xs text-slate-600 leading-relaxed">${dd.wikipedia.extract}</p>
            ${dd.wikipedia.url ? `<a href="${dd.wikipedia.url}" target="_blank" class="text-xs text-violet-600 hover:underline mt-1 inline-block">Wikipedia →</a>` : ''}
          </div>
        </div>` : ''}

        <!-- 1. Simply explained -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s1Title}</h3>
          <p class="text-sm text-slate-700 leading-relaxed">${esc(dd.explained_simply)}</p>
        </div>

        <!-- 2. Transfer steps -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s2Title}</h3>
          <div class="space-y-2">
            ${(dd.transfer_steps || []).map((s, i) => `
              <div class="flex gap-3 items-start bg-slate-50 rounded-xl px-4 py-3">
                <span class="w-5 h-5 rounded-full bg-violet-100 text-violet-700 text-xs font-bold flex items-center justify-center shrink-0 mt-0.5">${i + 1}</span>
                <div class="flex-1">
                  <div class="flex items-center justify-between mb-0.5">
                    <span class="text-xs font-semibold text-slate-700">${esc(s.step)}</span>
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full ${effortColor[s.effort] || 'text-slate-500 bg-slate-100'}">${t.effortLabels[s.effort] || esc(s.effort)}</span>
                  </div>
                  <p class="text-xs text-slate-600 leading-relaxed">${esc(s.description)}</p>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- 3. Critical experiment -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s3Title}</h3>
          <div class="bg-violet-50 border border-violet-100 rounded-xl p-4 space-y-3">
            <div><div class="text-xs font-semibold text-violet-600 mb-1">${t.s3Hypothesis}</div><p class="text-sm text-slate-700">${esc(dd.critical_experiment?.hypothesis)}</p></div>
            <div><div class="text-xs font-semibold text-violet-600 mb-1">${t.s3Experiment}</div><p class="text-sm text-slate-700">${esc(dd.critical_experiment?.experiment)}</p></div>
            <div class="flex gap-4">
              <div><div class="text-xs font-semibold text-violet-600 mb-1">${t.s3Timeframe}</div><p class="text-sm text-slate-700">${esc(dd.critical_experiment?.timeframe)}</p></div>
              <div><div class="text-xs font-semibold text-violet-600 mb-1">${t.s3Signal}</div><p class="text-sm text-slate-700">${esc(dd.critical_experiment?.success_signal)}</p></div>
            </div>
          </div>
        </div>

        <!-- 4. Resistance -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s4Title}</h3>
          <div class="space-y-3">
            ${(dd.resistance || []).map(r => `
              <div class="border border-slate-200 rounded-xl p-4 space-y-2">
                <div class="text-xs font-semibold text-slate-800">${esc(r.stakeholder)}</div>
                <div class="grid grid-cols-3 gap-2 text-xs">
                  <div><div class="text-slate-400 mb-1">${t.s4Instinct}</div><p class="text-slate-600 italic">"${esc(r.instinct)}"</p></div>
                  <div><div class="text-slate-400 mb-1">${t.s4Real}</div><p class="text-slate-600">${esc(r.real_concern)}</p></div>
                  <div><div class="text-slate-400 mb-1">${t.s4Response}</div><p class="text-slate-600">${esc(r.response)}</p></div>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- 5. Open questions -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s5Title}</h3>
          <ul class="space-y-2">
            ${(dd.open_questions || []).map((q, i) => `
              <li class="flex gap-3 text-sm text-slate-700">
                <span class="text-violet-400 font-bold shrink-0">${i + 1}.</span>
                <span>${esc(q)}</span>
              </li>`).join('')}
          </ul>
        </div>

        <!-- 6. Warning signs -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s6Title}</h3>
          <ul class="space-y-2">
            ${(dd.warning_signs || []).map(w => `
              <li class="flex gap-2 items-start bg-rose-50 border border-rose-100 rounded-xl px-4 py-3 text-xs text-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4 text-rose-400 shrink-0 mt-0.5">
                  <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd"/>
                </svg>
                <span>${esc(w)}</span>
              </li>`).join('')}
          </ul>
        </div>

        <!-- 7. Implementation guide -->
        <div>
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-3">${t.s7Title}</h3>
          <div class="space-y-3">
            ${(dd.implementation_guide || []).map((phase, i) => `
              <div class="relative pl-8">
                <div class="absolute left-0 top-1 w-5 h-5 rounded-full bg-violet-600 text-white text-xs font-bold flex items-center justify-center">${i + 1}</div>
                ${i < (dd.implementation_guide.length - 1) ? '<div class="absolute left-2.5 top-6 bottom-0 w-px bg-violet-200"></div>' : ''}
                <div class="bg-white border border-slate-200 rounded-xl p-4 space-y-2">
                  <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-violet-600">${esc(phase.phase)}</span>
                    <span class="text-xs font-semibold text-slate-700">— ${esc(phase.title)}</span>
                  </div>
                  <ul class="space-y-1">
                    ${(phase.actions || []).map(a => `<li class="text-xs text-slate-600 flex gap-2"><span class="text-violet-300 shrink-0">→</span><span>${esc(a)}</span></li>`).join('')}
                  </ul>
                  <div class="pt-1 grid grid-cols-2 gap-2 text-xs">
                    <div><span class="text-slate-400">${t.s7Involved}: </span><span class="text-slate-600">${esc(phase.involved)}</span></div>
                    <div><span class="text-slate-400">${t.s7Success}: </span><span class="text-slate-600">${esc(phase.success_criteria)}</span></div>
                  </div>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Sources -->
        <div class="border-t border-slate-100 pt-6">
          <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-widest mb-4">${t.sourcesLabel}</h3>
          <div class="space-y-3">

            <!-- LLM -->
            <div class="flex gap-3 items-start">
              <span class="w-6 h-6 rounded-md bg-slate-100 flex items-center justify-center shrink-0 mt-0.5 text-xs">🤖</span>
              <div>
                <div class="text-xs font-semibold text-slate-700">${t.sourcesLLM}</div>
                <p class="text-xs text-slate-400 leading-relaxed mt-0.5">${t.sourcesLLMNote}</p>
              </div>
            </div>

            ${dd.wikipedia && dd.wikipedia.extract ? `
            <!-- Wikipedia -->
            <div class="flex gap-3 items-start">
              <span class="w-6 h-6 rounded-md bg-slate-100 flex items-center justify-center shrink-0 mt-0.5 text-xs">📖</span>
              <div>
                <div class="text-xs font-semibold text-slate-700">${t.sourcesWiki}
                  ${dd.wikipedia.url ? `— <a href="${esc(dd.wikipedia.url)}" target="_blank" class="text-violet-600 hover:underline">${esc(dd.wikipedia.title)}</a>` : esc(dd.wikipedia.title || '')}
                </div>
                <p class="text-xs text-slate-400 leading-relaxed mt-0.5">${t.sourcesWikiNote}</p>
              </div>
            </div>` : ''}

            ${dd._papers && dd._papers.length > 0 ? `
            <!-- OpenAlex papers -->
            <div class="flex gap-3 items-start">
              <span class="w-6 h-6 rounded-md bg-slate-100 flex items-center justify-center shrink-0 mt-0.5 text-xs">📄</span>
              <div class="flex-1">
                <div class="text-xs font-semibold text-slate-700">${t.sourcesPapers}</div>
                <p class="text-xs text-slate-400 leading-relaxed mt-0.5 mb-2">${t.sourcesPapersNote}</p>
                <ul class="space-y-1.5">
                  ${dd._papers.filter(p => p.title && !p.error).map(p => `
                    <li class="text-xs text-slate-600">
                      ${p.doi
                        ? `<a href="${esc(p.doi)}" target="_blank" class="hover:text-violet-600 hover:underline">${esc(p.title)}</a>`
                        : esc(p.title)}
                      <span class="text-slate-400 ml-1">(${p.year}${p.citations ? ` · ${p.citations} citations` : ''})</span>
                    </li>`).join('')}
                </ul>
              </div>
            </div>` : ''}

          </div>
        </div>
      `
    }

    document.addEventListener('DOMContentLoaded', () => {
      setLang('en')
      document.getElementById('problem-input').addEventListener('keydown', e => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') fetchQuestions()
      })
    })
  </script>
</body>
</html>
